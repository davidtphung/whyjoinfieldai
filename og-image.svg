<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="100%" stop-color="#111218"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5733"/>
      <stop offset="100%" stop-color="#5b9cf5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ff5733" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff5733" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <rect width="1200" height="200" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="140" width="4" height="350" rx="2" fill="url(#accent-bar)"/>

  <!-- Construction crane + robot arm icon cluster -->
  <g transform="translate(920, 100)" opacity="0.12">
    <!-- Crane mast -->
    <line x1="0" y1="400" x2="0" y2="40" stroke="#ff5733" stroke-width="12" stroke-linecap="round"/>
    <!-- Boom -->
    <line x1="0" y1="50" x2="200" y2="50" stroke="#ff5733" stroke-width="10" stroke-linecap="round"/>
    <!-- Robot joint -->
    <circle cx="200" cy="50" r="16" fill="none" stroke="#5b9cf5" stroke-width="6"/>
    <!-- Robot arm -->
    <line x1="200" y1="66" x2="200" y2="180" stroke="#5b9cf5" stroke-width="8" stroke-linecap="round"/>
    <!-- Gripper -->
    <line x1="178" y1="180" x2="200" y2="155" stroke="#5b9cf5" stroke-width="6" stroke-linecap="round"/>
    <line x1="222" y1="180" x2="200" y2="155" stroke="#5b9cf5" stroke-width="6" stroke-linecap="round"/>
    <!-- Signal dots -->
    <circle cx="160" cy="90" r="5" fill="#3ddc84"/>
    <circle cx="140" cy="75" r="4" fill="#3ddc84" opacity="0.6"/>
    <circle cx="175" cy="110" r="3" fill="#3ddc84" opacity="0.4"/>
    <!-- Base -->
    <line x1="-40" y1="400" x2="40" y2="400" stroke="#ff5733" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Grid dots background pattern -->
  <g opacity="0.04" fill="#fff">
    <circle cx="200" cy="100" r="2"/><circle cx="260" cy="100" r="2"/><circle cx="320" cy="100" r="2"/>
    <circle cx="200" cy="160" r="2"/><circle cx="260" cy="160" r="2"/><circle cx="320" cy="160" r="2"/>
    <circle cx="200" cy="220" r="2"/><circle cx="260" cy="220" r="2"/><circle cx="320" cy="220" r="2"/>
  </g>

  <!-- Label -->
  <text x="110" y="185" font-family="monospace" font-size="14" fill="#ff5733" letter-spacing="4" text-transform="uppercase">CAMPAIGN SITE</text>

  <!-- Name -->
  <text x="110" y="265" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="62" font-weight="700" fill="#e8e9ed" letter-spacing="-1">David T Phung</text>

  <!-- Arrow + FieldAI -->
  <text x="110" y="340" font-family="system-ui,Helvetica,Arial,sans-serif" font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="#9a9daa">&#x2192;  </tspan><tspan fill="#ff5733">FieldAI</tspan>
  </text>

  <!-- Role -->
  <text x="110" y="400" font-family="monospace" font-size="18" fill="#9a9daa" letter-spacing="2">TECHNICAL PROGRAM MANAGER</text>
  <text x="110" y="428" font-family="monospace" font-size="18" fill="#9a9daa" letter-spacing="2">ROBOTICS &#x26; AUTONOMY</text>

  <!-- Bottom tags -->
  <g transform="translate(110, 490)">
    <rect x="0" y="0" width="120" height="30" rx="3" fill="none" stroke="#333" stroke-width="1"/>
    <text x="60" y="20" font-family="monospace" font-size="11" fill="#9a9daa" text-anchor="middle" letter-spacing="1">LOS ANGELES</text>

    <rect x="135" y="0" width="100" height="30" rx="3" fill="none" stroke="#333" stroke-width="1"/>
    <text x="185" y="20" font-family="monospace" font-size="11" fill="#9a9daa" text-anchor="middle" letter-spacing="1">B.ARCH</text>

    <rect x="250" y="0" width="120" height="30" rx="3" fill="none" stroke="#333" stroke-width="1"/>
    <text x="310" y="20" font-family="monospace" font-size="11" fill="#9a9daa" text-anchor="middle" letter-spacing="1">U.S. CITIZEN</text>

    <rect x="385" y="0" width="140" height="30" rx="3" fill="none" stroke="#333" stroke-width="1"/>
    <text x="455" y="20" font-family="monospace" font-size="11" fill="#9a9daa" text-anchor="middle" letter-spacing="1">AVAILABLE NOW</text>
  </g>

  <!-- Bottom border line -->
  <rect x="0" y="626" width="1200" height="4" fill="#ff5733"/>
</svg>
